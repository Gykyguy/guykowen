<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Main Portfolio</title>
  <link rel="stylesheet" href="https://use.typekit.net/mtz2wth.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      color: #111;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 54px;
      padding: 72px 24px 32px;
    }

    .toggle-bar {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 500;
      pointer-events: auto;
    }

    .toggle {
      display: flex;
      width: 63px;
      height: 20px;
      border: 0;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      background: transparent;
      font-weight: 700;
      font-size: 0.55rem;
      text-transform: uppercase;
    }

    .toggle-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      transition: background 0.35s ease;
    }

    .toggle[data-state="on"] .toggle-track {
      background: #4ade80;
    }

    .toggle[data-state="off"] .toggle-track {
      background: #ef4444;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      width: 25px;
      height: calc(100% - 4px);
      background: #fff;
      border-radius: 4px;
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle[data-state="on"] .toggle-thumb {
      left: 2px;
      right: calc(100% - 27px);
    }

    .toggle[data-state="off"] .toggle-thumb {
      left: calc(100% - 27px);
      right: 2px;
    }

    .toggle-label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .toggle[data-state="on"] .toggle-label-off {
      opacity: 0;
    }

    .toggle[data-state="on"] .toggle-label-on {
      opacity: 1;
      right: 6px;
      left: auto;
    }

    .toggle[data-state="off"] .toggle-label-on {
      opacity: 0;
    }

    .toggle[data-state="off"] .toggle-label-off {
      opacity: 1;
      left: 6px;
      right: auto;
    }

    .tile-grid {
      display: flex;
      flex-wrap: nowrap;
      gap: 48px;
      justify-content: center;
      align-items: flex-start;
      width: max-content;
      margin: 0 auto;
    }

    .tile {
      width: auto;
      height: 250px;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      overflow: hidden;
      position: relative;
      cursor: pointer;
    }

    .tile img.tile-bg {
      width: auto;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .tile figcaption {
      position: absolute;
      left: 12px;
      top: 10px;
      margin: 0;
      color: #ffffff;
      font-family: sans-serif;
      font-size: 12pt;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      text-align: left;
      white-space: nowrap;
      z-index: 3;
    }

    .tile:hover figcaption {
      color: #000000;
    }

    .tile-cosa-logo {
      position: absolute;
      left: 12px;
      top: 10px;
      width: 128px;
      height: auto;
      max-height: 18px;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
    }

    .tile-cosa-logo-hover {
      opacity: 0;
      z-index: 3;
    }

    .tile:hover .tile-cosa-logo-default {
      opacity: 0;
    }

    .tile:hover .tile-cosa-logo-hover {
      opacity: 1;
    }

    body.physics-mode .tile {
      will-change: left, top;
    }

    @media (max-width: 980px) {
      body {
        justify-content: flex-start;
        padding-top: 72px;
      }

      .tile-grid {
        flex-direction: column;
        width: auto;
        max-width: none;
      }

      .tile {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="toggle-bar">
    <button type="button" class="toggle" data-state="on" aria-label="Toggle">
      <span class="toggle-track">
        <span class="toggle-thumb"></span>
        <span class="toggle-label toggle-label-on">ON</span>
        <span class="toggle-label toggle-label-off">OFF</span>
      </span>
    </button>
  </div>

  <main class="tile-grid" aria-label="Portfolio categories">
    <button class="tile" type="button" data-external-url="COSA_website/cosa_website_v3.html">
      <img class="tile-bg" src="COSA_website/HOUSE_SMALL/selection-12.jpg" alt="Okhra Cosa tile">
      <img class="tile-cosa-logo tile-cosa-logo-default" src="COSA_website/svg/okhra_cosa_new_white.png" alt="okhra - cosa">
      <img class="tile-cosa-logo tile-cosa-logo-hover" src="COSA_website/svg/okhra_cosa_new_black.png" alt="okhra - cosa hover">
    </button>

    <button class="tile" type="button" data-external-url="fine_art/fine_art_portfolio_v1.html">
      <img class="tile-bg" src="fine_art/cardboard_tile.jpg" alt="Fine arts tile">
      <figcaption>fine arts</figcaption>
    </button>

    <button class="tile" type="button" data-external-url="graphic_design_v1.html">
      <img class="tile-bg" src="docs/franzanyl/for_web/Poster_on_floor.jpg" alt="Graphic design tile">
      <figcaption>graphic design</figcaption>
    </button>
  </main>

  <script>
    const toggle = document.querySelector(".toggle");
    const toggleBar = document.querySelector(".toggle-bar");
    const tileGrid = document.querySelector(".tile-grid");
    const tiles = document.querySelectorAll(".tile");
    const tileBodies = [];
    const initialStates = new Map();

    const GRAVITY = 0.56;
    const BOUNCE = 0.24;
    const FRICTION = 0.94;
    const WALL_BOUNCE = 0.38;
    const LIFT = -0.28;
    const COLLISION_ELASTICITY = 0.16;

    let rafId = null;
    let physicsRunning = false;
    let physicsStopTimeout = null;
    let physicsStartTime = 0;

    function syncToggleBarPosition() {
      const r = tileGrid.getBoundingClientRect();
      toggleBar.style.left = `${Math.max(24, r.left)}px`;
      toggleBar.style.top = `${Math.max(16, r.top - 34)}px`;
    }

    window.addEventListener("resize", syncToggleBarPosition);
    window.addEventListener("load", syncToggleBarPosition);
    if (document.readyState === "complete") syncToggleBarPosition();
    else window.addEventListener("DOMContentLoaded", syncToggleBarPosition);

    function captureInitialStates() {
      if (initialStates.size) return;
      tiles.forEach((el) => {
        const rect = el.getBoundingClientRect();
        initialStates.set(el, {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height,
          style: el.getAttribute("style") || "",
        });
      });
    }

    function restoreInitialStyles() {
      tiles.forEach((el) => {
        const state = initialStates.get(el);
        if (!state) return;
        if (state.style) el.setAttribute("style", state.style);
        else el.removeAttribute("style");
      });
      document.body.classList.remove("physics-mode");
    }

    function stopPhysics() {
      physicsRunning = false;
      if (physicsStopTimeout) {
        clearTimeout(physicsStopTimeout);
        physicsStopTimeout = null;
      }
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      tileBodies.length = 0;
      restoreInitialStyles();
      syncToggleBarPosition();
    }

    function ensureFixedForPhysics(el, state, zIndex) {
      el.style.position = "fixed";
      el.style.left = state.left + "px";
      el.style.top = state.top + "px";
      el.style.width = state.width + "px";
      el.style.height = state.height + "px";
      el.style.margin = "0";
      el.style.zIndex = String(zIndex);
      el.style.transformOrigin = "50% 50%";
    }

    function startPhysics() {
      if (physicsRunning) return;
      captureInitialStates();
      document.body.classList.add("physics-mode");
      tileBodies.length = 0;
      physicsRunning = true;
      physicsStartTime = performance.now();
      if (physicsStopTimeout) clearTimeout(physicsStopTimeout);

      tiles.forEach((el, index) => {
        const state = initialStates.get(el);
        if (!state) return;
        ensureFixedForPhysics(el, state, 250);
        tileBodies.push({
          el,
          x: state.left,
          y: state.top,
          w: state.width,
          h: state.height,
          vx: (Math.random() - 0.5) * 8,
          vy: -4 - Math.random() * 3,
          angle: (Math.random() - 0.5) * 0.02,
          va: (Math.random() - 0.5) * 0.005,
          i: index,
        });
      });

      const step = () => {
        if (!physicsRunning) return;
        const elapsed = performance.now() - physicsStartTime;
        if (elapsed > 1600) {
          const slowT = Math.max(0, (2000 - elapsed) / 400);
          const smooth = slowT * slowT;
          tileBodies.forEach((b) => {
            b.vx *= smooth;
            b.vy *= smooth;
            b.va *= smooth;
          });
        }
        const floor = window.innerHeight;
        const rightWall = window.innerWidth;

        for (let i = 0; i < tileBodies.length; i += 1) {
          const b = tileBodies[i];
          b.vy += GRAVITY;
          b.x += b.vx;
          b.y += b.vy;
          b.angle += b.va;
          b.va *= 0.96;

          if (b.x < 0) {
            b.x = 0;
            b.vx = -b.vx * WALL_BOUNCE;
          } else if (b.x + b.w > rightWall) {
            b.x = rightWall - b.w;
            b.vx = -b.vx * WALL_BOUNCE;
          }

          if (b.y + b.h > floor) {
            b.y = floor - b.h;
            b.vy = -Math.abs(b.vy) * BOUNCE;
            b.vx *= FRICTION;
            b.va *= 0.82;
            b.va += b.vx * 0.00008;
            if (Math.abs(b.vy) < 0.6) b.vy = 0;
            if (Math.abs(b.vx) < 0.04) b.vx = 0;
            if (Math.abs(b.va) < 0.0002) b.va = 0;
          }
        }

        for (let i = 0; i < tileBodies.length; i += 1) {
          for (let j = i + 1; j < tileBodies.length; j += 1) {
            const a = tileBodies[i];
            const b = tileBodies[j];
            const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
            const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
            if (overlapX > 0 && overlapY > 0) {
              if (overlapX < overlapY) {
                const shift = overlapX / 2;
                if (a.x < b.x) {
                  a.x -= shift;
                  b.x += shift;
                } else {
                  a.x += shift;
                  b.x -= shift;
                }
                const avx = a.vx;
                a.vx = b.vx * COLLISION_ELASTICITY;
                b.vx = avx * COLLISION_ELASTICITY;
              } else {
                const shift = overlapY / 2;
                if (a.y < b.y) {
                  a.y -= shift;
                  b.y += shift;
                } else {
                  a.y += shift;
                  b.y -= shift;
                }
                const avy = a.vy;
                a.vy = b.vy * COLLISION_ELASTICITY + LIFT;
                b.vy = avy * COLLISION_ELASTICITY + LIFT;
              }
            }
          }
        }

        tileBodies.forEach((b) => {
          b.el.style.left = b.x + "px";
          b.el.style.top = b.y + "px";
          b.el.style.transform = `rotate(${b.angle}rad)`;
        });

        rafId = requestAnimationFrame(step);
      };

      rafId = requestAnimationFrame(step);

      physicsStopTimeout = setTimeout(() => {
        if (!physicsRunning) return;
        physicsRunning = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
        tileBodies.forEach((b) => {
          b.vx = 0;
          b.vy = 0;
          b.va = 0;
          b.el.style.left = b.x + "px";
          b.el.style.top = b.y + "px";
          b.el.style.transform = `rotate(${b.angle}rad)`;
        });
      }, 2000);
    }

    toggle.addEventListener("click", () => {
      const isOn = toggle.getAttribute("data-state") === "on";
      const nextIsOn = !isOn;
      toggle.setAttribute("data-state", nextIsOn ? "on" : "off");
      if (nextIsOn) stopPhysics();
      else startPhysics();
    });

    tiles.forEach((tile) => {
      tile.addEventListener("click", () => {
        const url = tile.dataset.externalUrl;
        if (!url) return;
        window.location.href = url;
      });
    });
  </script>
</body>
</html>
