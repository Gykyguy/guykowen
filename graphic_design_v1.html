<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphic Design v1</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 132px 24px 24px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    .header {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      z-index: 220;
    }

    .toggle {
      margin-left: 65px;
    }

    .logo {
      width: 240px;
      height: auto;
      cursor: pointer;
    }

    .logo svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .toggle {
      display: flex;
      width: 63px;
      height: 20px;
      border: 0;
      border-radius: 5px;
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      background: transparent;
      font-weight: 700;
      font-size: 0.55rem;
      text-transform: uppercase;
    }

    .toggle-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      transition: background 0.35s ease;
    }

    .toggle[data-state="on"] .toggle-track {
      background: #4ade80;
    }

    .toggle[data-state="off"] .toggle-track {
      background: #ef4444;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      width: 25px;
      height: calc(100% - 4px);
      background: #ffffff;
      border-radius: 4px;
      transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .toggle[data-state="on"] .toggle-thumb {
      left: 2px;
      right: calc(100% - 27px);
    }

    .toggle[data-state="off"] .toggle-thumb {
      left: calc(100% - 27px);
      right: 2px;
    }

    .toggle-label {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #ffffff;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .toggle[data-state="on"] .toggle-label-off {
      opacity: 0;
    }

    .toggle[data-state="on"] .toggle-label-on {
      opacity: 1;
      right: 6px;
      left: auto;
    }

    .toggle[data-state="off"] .toggle-label-on {
      opacity: 0;
    }

    .toggle[data-state="off"] .toggle-label-off {
      opacity: 1;
      left: 6px;
      right: auto;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(3, 250px);
      grid-template-rows: repeat(2, 250px);
      gap: 100px;
      justify-content: center;
      align-content: center;
      width: max-content;
      margin: 0 auto;
    }

    .tile {
      width: 250px;
      height: 250px;
      flex: 0 0 250px;
      margin: 0;
      padding: 0;
      border: 0;
      background: #f5f5f5;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      text-align: left;
    }

    .tile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tile figcaption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 10px 12px;
      background: transparent;
      color: #ffffff;
      font-size: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      text-align: left;
    }

    .tile:hover figcaption {
      color: #000000;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      background: #ffffff;
      z-index: 500;
      padding: 72px 24px 24px;
      overflow-y: auto;
    }

    .overlay.active {
      display: block;
    }

    .overlay-close {
      position: fixed;
      top: 20px;
      right: 224px;
      border: 0;
      background: transparent;
      color: #111;
      width: 40px;
      height: 40px;
      padding: 0;
      cursor: pointer;
      font-size: 40px;
      line-height: 1;
      z-index: 520;
    }

    .overlay-stack {
      width: min(100%, 860px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .overlay-stack img,
    .overlay-stack video,
    .overlay-stack iframe {
      width: 100%;
      display: block;
      border: 0;
      background: #000;
    }

    .overlay-stack video {
      max-height: 86vh;
    }

    .overlay-stack iframe {
      height: 86vh;
    }

    #overlay-wayhome {
      padding: 0;
      background: #fff;
      overflow: hidden;
      cursor: pointer;
    }

    #overlay-wayhome .overlay-stack {
      width: 100vw;
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #overlay-wayhome video {
      width: auto;
      max-width: 100vw;
      height: 700px;
      max-height: 100vh;
      object-fit: contain;
      background: #fff;
      margin: 0 auto;
    }

    body.physics-mode .tile,
    body.physics-mode .logo-red-falling {
      will-change: left, top;
    }

    .logo-red-falling {
      position: fixed;
      pointer-events: none;
      z-index: 320;
    }

    .logo-red-falling svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 860px) {
      body {
        padding: 132px 16px 16px;
      }

      .tile-grid {
        grid-template-columns: repeat(2, 250px);
        grid-template-rows: repeat(3, 250px);
        width: max-content;
      }
    }
  </style>
</head>
<body>

    <button type="button" class="toggle" data-state="on" aria-label="Toggle">
      <span class="toggle-track">
        <span class="toggle-thumb"></span>
        <span class="toggle-label toggle-label-on">ON</span>

    <div class="logo" aria-label="GYKY logo">

        <g>

          <path d="M105.12,40.67h11.29l4.4,12.34,4.4-12.34h8.6l-11.14,27.08c-2,4.8-4.05,7.45-10.29,7.45-1.55,0-2.65-.2-3.75-.5v-7c1.05.15,1.85.2,2.7.2,1.75,0,3.25-1.3,3.55-3.3l-9.74-23.94Z"/>
          <path d="M135.25,30.08h10.89v19.84l7.6-9.24h9.89l-6.65,8.69,7.35,16.79h-11.44l-4.15-9.69-2.6,3.55v6.15h-10.89V30.08Z"/>
          <path d="M161.88,40.67h11.29l4.4,12.34,4.4-12.34h8.6l-11.14,27.08c-2,4.8-4.05,7.45-10.29,7.45-1.55,0-2.65-.2-3.75-.5v-7c1.05.15,1.85.2,2.7.2,1.75,0,3.25-1.3,3.55-3.3l-9.74-23.94Z"/>
        </g>
        <g id="logo-red-static">
          <path class="logo-cls-1" d="M171.11,40.56h14.13v12.74l-8.15,10.2h-5.8l4.35-9.54h-4.53v-13.4Z"/>
          <path class="logo-cls-1" d="M114.41,40.56h14.13v12.74l-8.15,10.2h-5.8l4.35-9.54h-4.53v-13.4Z"/>
          <polygon class="logo-cls-1" points="139.48 30.08 139.53 57.1 148.61 57.1 160.3 57.1 155.58 46.3 160.3 40.71 150.21 40.71 149.13 40.71 148.66 40.71 146.03 30.25 139.48 30.08"/>
          <path class="logo-cls-1" d="M72.73,45.16c0-8.66,7.02-16.01,15.67-15.67,9.25.36,16.13,6.14,15.42,16.99-.57,8.64-6.76,14.36-15.42,14.36-7.97,0-14.55-5.95-15.54-13.65-.09-.66-.13-1.34-.13-2.02Z"/>
        </g>
      </svg>
    </div>
  </div>

  <script>
    const toggle = document.querySelector(".toggle");
    const tiles = document.querySelectorAll(".tile");
    const overlays = document.querySelectorAll(".overlay");
    const logo = document.querySelector(".logo");
    const tileBodies = [];
    const logoBodies = [];
    const initialStates = new Map();

    const GRAVITY = 0.56;
    const BOUNCE = 0.24;
    const FRICTION = 0.94;
    const WALL_BOUNCE = 0.38;
    const LIFT = -0.28;
    const COLLISION_ELASTICITY = 0.16;

    const LOGO_RED_SHAPES = [
      { x: 171.11, y: 40.56, w: 14.13, h: 22.94, viewBox: "0 0 262.02 109.53", path: "M171.11,40.56h14.13v12.74l-8.15,10.2h-5.8l4.35-9.54h-4.53v-13.4Z" },
      { x: 114.41, y: 40.56, w: 14.13, h: 22.94, viewBox: "0 0 262.02 109.53", path: "M114.41,40.56h14.13v12.74l-8.15,10.2h-5.8l4.35-9.54h-4.53v-13.4Z" },
      { x: 139.48, y: 30.08, w: 20.82, h: 27.02, viewBox: "0 0 262.02 109.53", polygon: "139.48 30.08 139.53 57.1 148.61 57.1 160.3 57.1 155.58 46.3 160.3 40.71 150.21 40.71 149.13 40.71 148.66 40.71 146.03 30.25 139.48 30.08" },
      { x: 72.73, y: 30.08, w: 31.22, h: 30.76, viewBox: "0 0 262.02 109.53", path: "M72.73,45.16c0-8.66,7.02-16.01,15.67-15.67,9.25.36,16.13,6.14,15.42,16.99-.57,8.64-6.76,14.36-15.42,14.36-7.97,0-14.55-5.95-15.54-13.65-.09-.66-.13-1.34-.13-2.02Z" }
    ];

    let rafId = null;
    let physicsRunning = false;
    let physicsStopTimeout = null;
    let physicsStartTime = 0;

    function captureInitialStates() {
      if (initialStates.size) return;
      tiles.forEach((el) => {
        const rect = el.getBoundingClientRect();
        initialStates.set(el, {
          left: rect.left,
          top: rect.top,
          width: rect.width,
          height: rect.height,
          style: el.getAttribute("style") || "",
        });
      });
    }

    function restoreInitialStyles() {
      tiles.forEach((el) => {
        const state = initialStates.get(el);
        if (!state) return;
        if (state.style) {
          el.setAttribute("style", state.style);
        } else {
          el.removeAttribute("style");
        }
      });
      const logoRedStatic = document.getElementById("logo-red-static");
      if (logoRedStatic) logoRedStatic.style.visibility = "";
      document.querySelectorAll(".logo-red-falling").forEach((el) => el.remove());
      document.body.classList.remove("physics-mode");
    }

    function stopPhysics() {
      physicsRunning = false;
      if (physicsStopTimeout) {
        clearTimeout(physicsStopTimeout);
        physicsStopTimeout = null;
      }
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      tileBodies.length = 0;
      logoBodies.length = 0;
      restoreInitialStyles();
    }

    function stopOverlayMedia(overlay) {
      overlay.querySelectorAll("video").forEach((video) => {
        video.pause();
        video.currentTime = 0;
      });
    }

    function ensureFixedForPhysics(el, state, zIndex) {
      el.style.position = "fixed";
      el.style.left = state.left + "px";
      el.style.top = state.top + "px";
      el.style.width = state.width + "px";
      el.style.height = state.height + "px";
      el.style.margin = "0";
      el.style.zIndex = String(zIndex);
      el.style.transformOrigin = "50% 50%";
    }

    function createLogoRedElement(shape, logoRect) {
      const scale = logoRect.width / 262.02;
      const w = Math.max(20, Math.round(shape.w * scale));
      const h = Math.max(20, Math.round(shape.h * scale));
      const x = logoRect.left + (shape.x / 262.02) * logoRect.width;
      const y = logoRect.top + (shape.y / 109.53) * logoRect.height;
      const el = document.createElement("div");
      el.className = "logo-red-falling";
      el.style.left = x + "px";
      el.style.top = y + "px";
      el.style.width = w + "px";
      el.style.height = h + "px";
      const vb = `${shape.x} ${shape.y} ${shape.w} ${shape.h}`;
      el.innerHTML = shape.path
        ? `<svg viewBox="${vb}" preserveAspectRatio="xMidYMid meet"><path fill="#ff1a41" d="${shape.path}"/></svg>`
        : `<svg viewBox="${vb}" preserveAspectRatio="xMidYMid meet"><polygon fill="#ff1a41" points="${shape.polygon}"/></svg>`;
      document.body.appendChild(el);
      return { el, x, y, w, h, vx: (Math.random() - 0.5) * 6, vy: -6 - Math.random() * 2 };
    }

    function startPhysics() {
      if (physicsRunning) return;
      captureInitialStates();
      closeOverlays();
      document.body.classList.add("physics-mode");
      tileBodies.length = 0;
      logoBodies.length = 0;
      physicsRunning = true;
      physicsStartTime = performance.now();
      if (physicsStopTimeout) clearTimeout(physicsStopTimeout);

      const logoRedStatic = document.getElementById("logo-red-static");
      const logoRect = logo.getBoundingClientRect();
      if (logoRedStatic) logoRedStatic.style.visibility = "hidden";
      LOGO_RED_SHAPES.forEach((shape) => {
        logoBodies.push(createLogoRedElement(shape, logoRect));
      });

      tiles.forEach((el, index) => {
        const state = initialStates.get(el);
        if (!state) return;
        ensureFixedForPhysics(el, state, 250);
        tileBodies.push({
          el,
          x: state.left,
          y: state.top,
          w: state.width,
          h: state.height,
          vx: (Math.random() - 0.5) * 8,
          vy: -4 - Math.random() * 3,
          angle: (Math.random() - 0.5) * 0.02,
          va: (Math.random() - 0.5) * 0.005,
          i: index,
        });
      });

      const step = () => {
        if (!physicsRunning) return;
        const elapsed = performance.now() - physicsStartTime;
        if (elapsed > 1600) {
          const slowT = Math.max(0, (2000 - elapsed) / 400);
          const smooth = slowT * slowT;
          tileBodies.forEach((b) => {
            b.vx *= smooth;
            b.vy *= smooth;
            b.va *= smooth;
          });
          logoBodies.forEach((b) => {
            b.vx *= smooth;
            b.vy *= smooth;
          });
        }
        const floor = window.innerHeight;
        const rightWall = window.innerWidth;

        for (let i = 0; i < tileBodies.length; i += 1) {
          const b = tileBodies[i];
          b.vy += GRAVITY;
          b.x += b.vx;
          b.y += b.vy;
          b.angle += b.va;
          b.va *= 0.96;

          if (b.x < 0) {
            b.x = 0;
            b.vx = -b.vx * WALL_BOUNCE;
          } else if (b.x + b.w > rightWall) {
            b.x = rightWall - b.w;
            b.vx = -b.vx * WALL_BOUNCE;
          }

          if (b.y + b.h > floor) {
            b.y = floor - b.h;
            b.vy = -Math.abs(b.vy) * BOUNCE;
            b.vx *= FRICTION;
            b.va *= 0.82;
            b.va += b.vx * 0.00008;
            if (Math.abs(b.vy) < 0.6) b.vy = 0;
            if (Math.abs(b.vx) < 0.04) b.vx = 0;
            if (Math.abs(b.va) < 0.0002) b.va = 0;
          }

          if (b.y < 0) {
            b.y = 0;
            b.vy = Math.abs(b.vy) * WALL_BOUNCE;
          }
        }

        for (let i = 0; i < tileBodies.length; i += 1) {
          for (let j = i + 1; j < tileBodies.length; j += 1) {
            const a = tileBodies[i];
            const b = tileBodies[j];
            const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
            const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
            if (overlapX > 0 && overlapY > 0) {
              if (overlapX < overlapY) {
                const shift = overlapX / 2;
                if (a.x < b.x) {
                  a.x -= shift;
                  b.x += shift;
                } else {
                  a.x += shift;
                  b.x -= shift;
                }
                const avx = a.vx;
                a.vx = b.vx * COLLISION_ELASTICITY;
                b.vx = avx * COLLISION_ELASTICITY;
                a.va += (Math.random() - 0.5) * 0.0012;
                b.va += (Math.random() - 0.5) * 0.0012;
              } else {
                const shift = overlapY / 2;
                if (a.y < b.y) {
                  a.y -= shift;
                  b.y += shift;
                } else {
                  a.y += shift;
                  b.y -= shift;
                }
                const avy = a.vy;
                a.vy = b.vy * COLLISION_ELASTICITY + LIFT;
                b.vy = avy * COLLISION_ELASTICITY + LIFT;
                a.va += (Math.random() - 0.5) * 0.0018;
                b.va += (Math.random() - 0.5) * 0.0018;
              }
            }
          }
        }

        tileBodies.forEach((b) => {
          b.el.style.left = b.x + "px";
          b.el.style.top = b.y + "px";
          b.el.style.transform = `rotate(${b.angle}rad)`;
        });

        logoBodies.forEach((b) => {
          b.vy += GRAVITY;
          b.x += b.vx;
          b.y += b.vy;
          if (b.x < 0) {
            b.x = 0;
            b.vx = -b.vx * WALL_BOUNCE;
          } else if (b.x + b.w > rightWall) {
            b.x = rightWall - b.w;
            b.vx = -b.vx * WALL_BOUNCE;
          }
          if (b.y + b.h > floor) {
            b.y = floor - b.h;
            b.vy = -Math.abs(b.vy) * BOUNCE;
            b.vx *= FRICTION;
            if (Math.abs(b.vy) < 0.6) b.vy = 0;
            if (Math.abs(b.vx) < 0.04) b.vx = 0;
          }
          b.el.style.left = b.x + "px";
          b.el.style.top = b.y + "px";
        });

        rafId = requestAnimationFrame(step);
      };

      rafId = requestAnimationFrame(step);

      physicsStopTimeout = setTimeout(() => {
        if (!physicsRunning) return;
        physicsRunning = false;
        if (rafId) {
          cancelAnimationFrame(rafId);
          rafId = null;
        }
        tileBodies.forEach((b) => {
          b.vx = 0;
          b.vy = 0;
          b.va = 0;
          b.el.style.left = b.x + "px";
          b.el.style.top = b.y + "px";
          b.el.style.transform = `rotate(${b.angle}rad)`;
        });
        logoBodies.forEach((b) => {
          b.vx = 0;
          b.vy = 0;
          b.el.style.left = b.x + "px";
          b.el.style.top = b.y + "px";
        });
      }, 2000);
    }

    function openOverlay(id) {
      overlays.forEach((overlay) => {
        overlay.classList.remove("active");
        overlay.setAttribute("aria-hidden", "true");
        stopOverlayMedia(overlay);
      });
      const target = document.getElementById(id);
      if (!target) return;
      target.classList.add("active");
      target.setAttribute("aria-hidden", "false");
      target.querySelectorAll("video").forEach((video) => {
        video.currentTime = 0;
        if (target.id === "overlay-heart") {
          video.muted = false;
        }
        video.play().catch(() => {});
      });
    }

    function closeOverlays() {
      overlays.forEach((overlay) => {
        overlay.classList.remove("active");
        overlay.setAttribute("aria-hidden", "true");
        stopOverlayMedia(overlay);
      });
    }

    toggle.addEventListener("click", () => {
      const isOn = toggle.getAttribute("data-state") === "on";
      const nextIsOn = !isOn;
      toggle.setAttribute("data-state", nextIsOn ? "on" : "off");
      if (nextIsOn) {
        stopPhysics();
      } else {
        startPhysics();
      }
    });

    logo.addEventListener("click", () => {
      closeOverlays();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    tiles.forEach((tile) => {
      tile.addEventListener("click", () => {
        if (tile.dataset.externalUrl) {
          window.location.href = tile.dataset.externalUrl;
          return;
        }
        openOverlay(tile.dataset.overlay);
      });
    });

    overlays.forEach((overlay) => {
      const closeBtn = overlay.querySelector(".overlay-close");
      if (closeBtn) closeBtn.addEventListener("click", closeOverlays);
      overlay.addEventListener("click", (event) => {
        if (event.target === overlay) closeOverlays();
      });
    });

    const wayhomeOverlay = document.getElementById("overlay-wayhome");
    wayhomeOverlay.addEventListener("click", closeOverlays);
    const wayhomeVideo = wayhomeOverlay.querySelector("video");
    wayhomeVideo.addEventListener("click", (event) => {
      event.stopPropagation();
      closeOverlays();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeOverlays();
    });
  </script>
</body>
</html>
